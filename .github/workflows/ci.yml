name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Syntax check
        run: |
          python -m py_compile cli.py core.py gui.py build.py
