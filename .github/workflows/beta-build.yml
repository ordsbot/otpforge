name: Beta Build (every 7 hours)

on:
  schedule:
    # Runs at 00:00, 07:00, 14:00, 21:00 UTC
    - cron: "0 */7 * * *"
  workflow_dispatch:

# Required so the workflow can create GitHub Releases with GITHUB_TOKEN
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            zip_name: linux
          - os: windows-latest
            platform: windows
            zip_name: windows
          - os: macos-latest
            platform: darwin
            zip_name: darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build executables
        run: python build.py

      - name: Get build timestamp (UTC)
        id: stamp
        run: echo "stamp=$(date -u +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create platform zip
        run: |
          VERSION=${{ steps.stamp.outputs.stamp }}
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            powershell "Compress-Archive -Path ./dist/* -DestinationPath ${{ matrix.zip_name }}-v$VERSION.zip"
          else
            zip -r ${{ matrix.zip_name }}-v$VERSION.zip ./dist/
          fi
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}-build
          path: ${{ matrix.zip_name }}-v*.zip

  create-source-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get build timestamp (UTC)
        id: stamp
        run: echo "stamp=$(date -u +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create source zip
        run: |
          VERSION=${{ steps.stamp.outputs.stamp }}
          zip clawhub-package-v$VERSION.zip cli.py core.py gui.py SKILL.md build.py otpforge.spec

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-build
          path: clawhub-package-v*.zip

  release:
    needs: [build, create-source-zip]
    runs-on: ubuntu-latest

    steps:
      - name: Get build timestamp (UTC)
        id: stamp
        run: echo "stamp=$(date -u +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: beta-${{ steps.stamp.outputs.stamp }}
          name: Beta Build ${{ steps.stamp.outputs.stamp }} (UTC)
          body: |
            Automated beta build for ${{ steps.stamp.outputs.stamp }} UTC.

            Artifacts:
            - Linux, Windows, macOS zips
            - Source zip (Clawhub package)
          files: |
            linux-build/linux-v${{ steps.stamp.outputs.stamp }}.zip
            windows-build/windows-v${{ steps.stamp.outputs.stamp }}.zip
            darwin-build/darwin-v${{ steps.stamp.outputs.stamp }}.zip
            source-build/clawhub-package-v${{ steps.stamp.outputs.stamp }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
